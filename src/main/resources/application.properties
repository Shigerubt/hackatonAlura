spring.application.name=hackatonAlura

# Use H2 in-memory database for local/testing when no external DB is available
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Disable Flyway migrations to avoid MySQL-specific Flyway resolver errors
spring.flyway.enabled=false

api.security.secret=1234